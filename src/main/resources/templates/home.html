<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Dynamic Title -->

    <title th:text="${appName}">AppLaunch</title>
    <meta name="description" th:content="${appDescription}" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: 'Poppins', sans-serif;
          background: radial-gradient(circle at top, #0f172a, #020617);
          color: #fff;
        }

        header {
          display: flex;
          justify-content: space-between;
          padding: 20px 50px;
          align-items: center;
          position: sticky;
          top: 0;
          backdrop-filter: blur(12px);
          background: rgba(2,6,23,0.6);
        }

        .logo { color: #38bdf8; font-weight: 600; font-size: 1.5rem; }

        nav a {
          color: #ccc;
          margin-left: 25px;
          text-decoration: none;
          transition: 0.3s;
        }

        nav a:hover { color: #38bdf8; }

        .hero {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 80px 50px;
          flex-wrap: wrap;
        }

        .hero-text { max-width: 500px; }

        .hero-text h1 {
          font-size: 3rem;
          margin-bottom: 20px;
        }

        .hero-text p {
          color: #94a3b8;
          margin-bottom: 25px;
        }

        .btn {
          padding: 12px 25px;
          border-radius: 10px;
          border: none;
          cursor: pointer;
          font-weight: 600;
          margin-right: 10px;
          transition: 0.3s;
        }

        .btn-primary {
          background: linear-gradient(135deg, #38bdf8, #22c55e);
          color: #000;
        }

        .btn-secondary {
          background: transparent;
          border: 1px solid #334155;
          color: #fff;
        }

        .btn:hover {
          transform: translateY(-3px);
          box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .phone {
          width: 280px;
          height: 560px;
          background: #020617;
          border-radius: 30px;
          box-shadow: 0 0 40px rgba(56,189,248,0.3);
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
        }

        .phone img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        /* Screenshots */
        .screenshots {
          padding: 60px 50px;
          text-align: center;
        }

        .screenshots h2 {
          font-size: 2.2rem;
          margin-bottom: 30px;
        }

        .shots {
          display: flex;
          gap: 20px;
          justify-content: center;
          flex-wrap: wrap;
        }

        .shots img {
          width: 220px;
          border-radius: 16px;
          box-shadow: 0 0 20px rgba(56,189,248,0.3);
          transition: 0.3s;
        }

        .shots img:hover {
          transform: scale(1.05);
        }

        /* Download */
        .download {
          text-align: center;
          padding: 80px 20px;
        }

        .download h2 {
          font-size: 2.5rem;
          margin-bottom: 20px;
        }

        .download-buttons a {
          display: inline-block;
          margin: 10px;
          padding: 14px 30px;
          border-radius: 10px;
          text-decoration: none;
          font-weight: 600;
          transition: 0.3s;
        }

        .apk-btn {
          background: linear-gradient(135deg, #22c55e, #38bdf8);
          color: #000;
        }

        .github-btn {
          border: 1px solid #334155;
          color: #fff;
        }

        footer {
          text-align: center;
          padding: 20px;
          color: #64748b;
        }

        @media(max-width: 768px) {

  /* General spacing */
  header {
    padding: 15px 20px;
    flex-direction: column;
    gap: 10px;
  }

  nav {
    display: flex;
    gap: 15px;
  }

  nav a {
    margin-left: 0;
  }

  /* HERO FIX */
  .hero {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 50px 20px;
    gap: 30px;
  }

  .hero-text {
    max-width: 100%;
  }

  .hero-text h1 {
    font-size: 2rem; /* reduce size */
  }

  .hero-text p {
    font-size: 0.95rem;
  }

  /* Buttons */
  .btn {
    width: 100%;
    margin: 5px 0;
  }

  /* Phone Preview */
  .phone {
    width: 220px;
    height: 440px;
    margin-top: 10px;
  }

  /* Screenshots */
  .screenshots {
    padding: 40px 20px;
  }

  .screenshots h2 {
    font-size: 1.8rem;
  }

  .shots {
    flex-wrap: nowrap;
    overflow-x: auto;
    justify-content: flex-start;
    padding-bottom: 10px;
  }

  .shots img {
    width: 180px;
    flex-shrink: 0;
  }

  /* Download Section */
  .download {
    padding: 60px 20px;
  }

  .download h2 {
    font-size: 2rem;
  }

  .download-buttons a {
    display: block;
    width: 100%;
    margin: 10px 0;
    text-align: center;
  }

  /* Footer */
  footer {
    padding: 15px;
    font-size: 0.85rem;
  }
}

    </style>

</head>

<body>

<header>
    <div class="logo">AppLaunch</div>
    <nav>
        <a href="#">Home</a>
        <a href="#screenshots">Screenshots</a>
        <a href="#download">Download</a>
    </nav>
</header>

<!-- HERO -->

<section class="hero">
    <div class="hero-text">


        <!-- Dynamic App Name -->
        <h1 th:text="${appName}">App Name</h1>

        <!-- Dynamic Description -->
        <p th:text="${appDescription}">App description</p>

        <a href="#download">
            <button class="btn btn-primary">Download Now</button>
        </a>


    </div>

    <!-- Hero / Preview Image -->

    <div class="phone">
        <img th:if="${heroImage != null}" th:src="${heroImage}" />
        <span th:if="${heroImage == null}">App Preview</span>
    </div>
</section>

<!-- Screenshots -->

<section id="screenshots" class="screenshots">
    <h2>App Screenshots</h2>

    <div class="shots">


        <!-- Dynamic Screenshots -->
        <img th:each="img : ${screenshots}" th:src="${img}" />

        <!-- Fallback -->
        <img th:if="${screenshots == null}" src="https://picsum.photos/300/600?1">
        <img th:if="${screenshots == null}" src="https://picsum.photos/300/600?2">
        <img th:if="${screenshots == null}" src="https://picsum.photos/300/600?3">


    </div>
</section>

<!-- Download -->

<section id="download" class="download">
    <h2 th:text="'Download ' + ${appName}">Download App</h2>

    <p style="color:#94a3b8;">Get the latest version instantly</p>

    <div class="download-buttons">
        <a th:href="${apkLink}" class="apk-btn">⬇ Download APK</a>


        <a th:if="${githubLink != null}" th:href="${githubLink}" class="github-btn">
            View on GitHub
        </a>


    </div>
</section>

<footer>
    <p>© <span th:text="${developerName}">Developer</span></p>
</footer>

</body>
</html>
